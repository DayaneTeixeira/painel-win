<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Painel WIN — 5 Drivers</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg:     #0b1120;
    --bg2:    #0f172a;
    --bg3:    #131e35;
    --bg4:    #1a2744;
    --text:   #e2e8f4;
    --text2:  #8a9bbf;
    --text3:  #445577;
    --border: rgba(99,132,199,0.12);
    --border2:rgba(99,132,199,0.22);
    --radius-lg: 10px;
    --up:  #22d3a0;
    --dn:  #f87171;
    --neu: #445577;
    --acc: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    background: var(--bg2); color: var(--text);
    min-height: 100vh; padding: 20px 16px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  .topbar {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
    padding-bottom: 14px;
    border-bottom: 0.5px solid var(--border);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 34px; height: 34px; border-radius: 8px;
    background: #1d4ed8; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0; letter-spacing: 0.3px;
  }
  .ttl { font-size: 15px; font-weight: 500; color: var(--text); }
  .sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .badge {
    font-size: 10px; font-weight: 500; padding: 4px 10px;
    border-radius: 20px;
    background: rgba(34,211,160,0.08);
    color: var(--up);
    border: 0.5px solid rgba(34,211,160,0.25);
    display: flex; align-items: center; gap: 6px;
  }
  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--up);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 8px; margin-bottom: 10px;
  }
  .card {
    background: var(--bg3); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden;
    display: flex; flex-direction: column;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--border2); }
  .card.r1,.card.r2 { border-top: 2px solid #3b82f6; }
  .card.r3,.card.r4 { border-top: 2px solid #f59e0b; }
  .card.r5           { border-top: 2px solid #22d3a0; }
  .card.r6,.card.r7 { border-top: 2px solid #a78bfa; }
  .card.r8,.card.r9 { border-top: 2px solid #38bdf8; }
  .card.r10          { border-top: 2px solid #fb923c; }
  .card-top { padding: 10px 12px 7px; }
  .rank-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .rank { font-size: 10px; color: var(--text3); font-weight: 500; }
  .tag  { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; }
  .t-us { background: rgba(59,130,246,0.15); color: #93c5fd; border: 0.5px solid rgba(59,130,246,0.3); }
  .t-fx { background: rgba(245,158,11,0.12); color: #fcd34d; border: 0.5px solid rgba(245,158,11,0.3); }
  .t-cm { background: rgba(248,113,113,0.12); color: #fca5a5; border: 0.5px solid rgba(248,113,113,0.3); }
  .t-br { background: rgba(167,139,250,0.12); color: #c4b5fd; border: 0.5px solid rgba(167,139,250,0.3); }
  .t-et { background: rgba(251,146,60,0.12);  color: #fdba74; border: 0.5px solid rgba(251,146,60,0.3); }
  .sym  { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: 0.2px; }
  .name { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .price-row {
    display: flex; align-items: baseline; gap: 6px;
    padding: 5px 12px 2px;
  }
  .price-val {
    font-size: 18px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    color: var(--text);
  }
  .price-chg { font-size: 11px; font-weight: 500; font-variant-numeric: tabular-nums; }
  .chg-up  { color: var(--up); }
  .chg-dn  { color: var(--dn); }
  .chg-neu { color: var(--neu); }
  .spark-wrap { padding: 4px 8px 5px; flex: 1; }
  .spark-wrap canvas { width: 100% !important; height: 70px !important; display: block; }
  .tv-link {
    display: block; text-align: right; font-size: 10px; color: var(--text3);
    padding: 0 12px 6px; text-decoration: none; opacity: 0.6;
  }
  .tv-link:hover { opacity: 1; color: #93c5fd; }
  .card-why {
    padding: 7px 12px; font-size: 10px; color: var(--text3);
    line-height: 1.55; border-top: 0.5px solid var(--border); margin-top: auto;
  }

  .signal-wrap { margin-bottom: 10px; }

  .verdict {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg3); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 12px 16px;
    margin-bottom: 8px;
  }
  .verdict-icon { font-size: 16px; flex-shrink: 0; }
  .verdict-text { font-size: 13px; font-weight: 600; letter-spacing: 0.2px; }
  .verdict-text.fav  { color: var(--up); }
  .verdict-text.def  { color: var(--dn); }
  .verdict-text.neu  { color: var(--acc); }
  .verdict-text.load { color: var(--text3); }
  .verdict-sub { font-size: 11px; color: var(--text3); margin-left: auto; white-space: nowrap; }

  .signal-panels {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  @media (max-width: 500px) { .signal-panels { grid-template-columns: 1fr; } }

  .signal-panel {
    background: var(--bg3); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden;
  }
  .signal-panel.panel-up { border-top: 2px solid #22d3a0; }
  .signal-panel.panel-dn { border-top: 2px solid #f87171; }

  .panel-header {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 13px 8px;
    border-bottom: 0.5px solid var(--border);
  }
  .panel-label { font-size: 11px; font-weight: 600; flex: 1; letter-spacing: 0.4px; text-transform: uppercase; }
  .panel-up .panel-label { color: var(--up); }
  .panel-dn .panel-label { color: var(--dn); }
  .panel-count {
    font-size: 11px; font-weight: 700;
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .panel-up .panel-count { background: rgba(34,211,160,0.15); color: var(--up); }
  .panel-dn .panel-count { background: rgba(248,113,113,0.15); color: var(--dn); }

  .panel-pills { padding: 8px 13px 10px; display: flex; flex-direction: column; gap: 5px; min-height: 40px; }
  .panel-empty { font-size: 11px; color: var(--text3); font-style: italic; }

  .pill {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; padding: 5px 10px;
    border-radius: 6px; border: 0.5px solid transparent;
  }
  .pill-label { font-weight: 700; margin-right: 6px; font-size: 10px; letter-spacing: 0.4px; }
  .pill-val   { font-variant-numeric: tabular-nums; font-family: 'SF Mono','Fira Code',monospace; margin-right: 6px; }
  .pill-desc  { font-size: 10px; opacity: 0.65; margin-left: auto; }
  .pill.ok  { background: rgba(34,211,160,0.08); color: #6ee7c7; border-color: rgba(34,211,160,0.2); }
  .pill.bad { background: rgba(248,113,113,0.08); color: #fca5a5; border-color: rgba(248,113,113,0.2); }

  .footer-row {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 4px; margin-top: 10px;
    padding-top: 10px; border-top: 0.5px solid var(--border);
  }
  .clock { font-size: 11px; color: var(--text3); font-variant-numeric: tabular-nums; font-family: monospace; }
  .note  { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 380px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">B3</div>
      <div>
        <div class="ttl">Painel WIN — 10 drivers principais</div>
        <div class="sub">Correlação com o mini-índice Ibovespa · day trade</div>
      </div>
    </div>
    <div class="badge">
      <span class="badge-dot"></span>
      Yahoo Finance live
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="signal-wrap">
    <!-- Verdict -->
    <div class="verdict" id="verdict">
      <span class="verdict-icon">⏳</span>
      <span class="verdict-text load" id="verdict-text">Carregando análise…</span>
      <span class="verdict-sub" id="verdict-sub"></span>
    </div>
    <!-- Two panels -->
    <div class="signal-panels">
      <div class="signal-panel panel-up">
        <div class="panel-header">
          <span>🟢</span>
          <span class="panel-label">A favor da ALTA</span>
          <span class="panel-count" id="count-up">—</span>
        </div>
        <div class="panel-pills" id="pills-up">
          <span class="panel-empty">Aguardando dados…</span>
        </div>
      </div>
      <div class="signal-panel panel-dn">
        <div class="panel-header">
          <span>🔴</span>
          <span class="panel-label">A favor da QUEDA</span>
          <span class="panel-count" id="count-dn">—</span>
        </div>
        <div class="panel-pills" id="pills-dn">
          <span class="panel-empty">Aguardando dados…</span>
        </div>
      </div>
    </div>
  </div>

  <div class="footer-row" style="padding-top:10px;border-top:0.5px solid var(--border);">
    <span class="clock" id="clock">BRT --:--:--</span>
    <span class="note">
      <i class="ti ti-refresh" style="font-size:12px"></i>
      Atualiza a cada 5 min
    </span>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script>
const INSTRUMENTS = [
  { rank:'#1', sym:'ES1!',    name:'Futuro S&P 500',   tag:'EUA',     tagCls:'t-us', cardCls:'r1', yf:'ES=F',     tvSym:'CME_MINI:ES1!',  dp:2 },
  { rank:'#2', sym:'VIX',     name:'Volatilidade S&P', tag:'EUA',     tagCls:'t-us', cardCls:'r2', yf:'%5EVIX',   tvSym:'CBOE:VIX',       dp:2 },
  { rank:'#3', sym:'DXY',     name:'Índice do dólar',  tag:'Câmbio',  tagCls:'t-fx', cardCls:'r3', yf:'DX-Y.NYB', tvSym:'TVC:DXY',        dp:3 },
  { rank:'#4', sym:'USD/BRL', name:'Dólar / Real',     tag:'Câmbio',  tagCls:'t-fx', cardCls:'r4', yf:'USDBRL=X', tvSym:'FX:USDBRL',      dp:4 },
  { rank:'#5', sym:'WTI',     name:'Petróleo WTI',     tag:'Cmdty',   tagCls:'t-cm', cardCls:'r5', yf:'CL=F',     tvSym:'NYMEX:CL1!',     dp:2 },
  { rank:'#6', sym:'NQ1!',    name:'Futuro Nasdaq 100',tag:'EUA',     tagCls:'t-us', cardCls:'r6', yf:'NQ=F',     tvSym:'CME_MINI:NQ1!',  dp:2 },
  { rank:'#7', sym:'SPX',     name:'S&P 500 à vista',  tag:'EUA',     tagCls:'t-us', cardCls:'r7', yf:'%5EGSPC',  tvSym:'SP:SPX',         dp:2 },
  { rank:'#8', sym:'BR10Y',   name:'Juro 10a Brasil',  tag:'Brasil',  tagCls:'t-br', cardCls:'r8', yf:'BRL=X',    tvSym:'TVC:BR10Y',      dp:4 },
  { rank:'#9', sym:'US10Y',   name:'Treasury 10a EUA', tag:'Juros',   tagCls:'t-br', cardCls:'r9', yf:'%5ETNX',   tvSym:'TVC:US10Y',      dp:3 },
  { rank:'#10',sym:'EWZ',     name:'ETF Brasil (NYSE)',tag:'ETF',     tagCls:'t-et', cardCls:'r10',yf:'EWZ',      tvSym:'AMEX:EWZ',       dp:2 },
];
const WHY = [
  'Move o WIN overnight. Principal referência global.',
  'Acima de 25 = fuga de risco. Correlação inversa direta.',
  'Dólar forte drena emergentes. Pesa no WIN via fluxo.',
  'Câmbio local. Alta do dólar pressiona o Ibovespa.',
  'Petrobras ≈15% do Ibov. Petróleo sobe = WIN sobe.',
  'Lidera o ES intraday. NQ forte = apetite por risco.',
  'Spot vs futuro. Divergência ES×SPX = pressão de curto prazo.',
  'Juro longo BR sobe = custo de capital sobe = WIN cai.',
  'Treasury sobe = dólar global sobe = emergentes sangram.',
  'Fluxo gringo em tempo real. Abre 10h30 BRT. Proxy direto do Ibov.',
];

const charts = {};
const latest = { es: null, vix: null, dxy: null, usdbrl: null, wti: null, nq: null, spx: null, br10y: null, us10y: null, ewz: null };

function buildGrid() {
  const grid = document.getElementById('grid');
  INSTRUMENTS.forEach((ins, i) => {
    const card = document.createElement('div');
    card.className = `card ${ins.cardCls}`;
    card.innerHTML = `
      <div class="card-top">
        <div class="rank-row">
          <span class="rank">${ins.rank}</span>
          <span class="tag ${ins.tagCls}">${ins.tag}</span>
        </div>
        <div class="sym">${ins.sym}</div>
        <div class="name">${ins.name}</div>
      </div>
      <div class="price-row" id="price-${i}">
        <span class="price-val">—</span>
        <span class="price-chg chg-neu">—</span>
      </div>
      <div class="spark-wrap">
        <canvas id="spark-${i}" height="70"></canvas>
      </div>
      <a class="tv-link" href="https://www.tradingview.com/chart/?symbol=${encodeURIComponent(ins.tvSym)}" target="_blank" rel="noopener">
        Ver no TradingView ↗
      </a>
      <div class="card-why">${WHY[i]}</div>
    `;
    grid.appendChild(card);
    const ctx = document.getElementById(`spark-${i}`).getContext('2d');
    const lineColor = (ins.cardCls==='r1'||ins.cardCls==='r2') ? '#3b82f6'
                    : (ins.cardCls==='r3'||ins.cardCls==='r4') ? '#f59e0b'
                    : ins.cardCls==='r5' ? '#22d3a0'
                    : (ins.cardCls==='r6'||ins.cardCls==='r7') ? '#a78bfa'
                    : (ins.cardCls==='r8'||ins.cardCls==='r9') ? '#38bdf8'
                    : '#fb923c';
    charts[i] = new Chart(ctx, {
      type: 'line',
      data: { labels: [], datasets: [{ data: [], borderColor: lineColor, borderWidth: 1.5,
        pointRadius: 0, fill: true, backgroundColor: lineColor+'18', tension: 0.3 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: { x: { display: false }, y: { display: false, grace: '5%' } },
        animation: { duration: 400 }
      }
    });
  });
}

async function fetchQuote(yf) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${yf}?interval=5m&range=1d`;
  const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
  const r = await fetch(proxy);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function parseQuote(json) {
  const result = json.chart.result[0];
  const meta   = result.meta;
  const closes = result.indicators.quote[0].close;
  const timestamps = result.timestamp;
  const pts = closes.map((c, i) => ({ c, t: timestamps[i] })).filter(p => p.c != null);
  const price = meta.regularMarketPrice ?? pts[pts.length-1]?.c;
  const prev  = meta.chartPreviousClose ?? meta.previousClose;
  const chg   = price - prev;
  const pct   = (chg / prev) * 100;
  return { price, chg, pct, pts };
}

function updateCard(i, data, ins) {
  const row = document.getElementById(`price-${i}`);
  row.querySelector('.price-val').textContent = data.price.toFixed(ins.dp);
  const sign = data.chg >= 0 ? '+' : '';
  const chgEl = row.querySelector('.price-chg');
  chgEl.textContent = `${sign}${data.chg.toFixed(ins.dp)} (${sign}${data.pct.toFixed(2)}%)`;
  chgEl.className = 'price-chg ' + (data.chg > 0 ? 'chg-up' : data.chg < 0 ? 'chg-dn' : 'chg-neu');
  const ch = charts[i];
  ch.data.labels = data.pts.map(p => p.t);
  ch.data.datasets[0].data = data.pts.map(p => p.c);
  ch.update('none');
}

function analyzeSignal() {
  const { es, vix, dxy, usdbrl, wti, nq, spx, br10y, us10y, ewz } = latest;
  if ([es, vix, dxy, usdbrl, wti, nq, spx, br10y, us10y, ewz].some(v => v === null)) return;

  // EWZ: verificar se mercado americano está aberto (10h30–18h00 BRT)
  const brt = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
  const brtMin = brt.getHours() * 60 + brt.getMinutes();
  const ewzOpen = brtMin >= 630 && brtMin < 1080; // 10h30 a 18h00

  const drivers = [
    { label:'ES1!',    val:`${es.pct>=0?'+':''}${es.pct.toFixed(2)}%`,     ok: es.pct > 0,        desc: es.pct > 0 ? 'S&P subindo' : 'S&P caindo' },
    { label:'VIX',     val:`${vix.pct>=0?'+':''}${vix.pct.toFixed(2)}%`,   ok: vix.pct < 0,       desc: vix.pct < 0 ? 'Vol. caindo' : 'Vol. subindo' },
    { label:'DXY',     val:`${dxy.pct>=0?'+':''}${dxy.pct.toFixed(2)}%`,   ok: dxy.pct < 0,       desc: dxy.pct < 0 ? 'USD global ↓' : 'USD global ↑' },
    { label:'USD/BRL', val:`${usdbrl.pct>=0?'+':''}${usdbrl.pct.toFixed(2)}%`, ok: usdbrl.pct < 0, desc: usdbrl.pct < 0 ? 'Dólar/Real ↓' : 'Dólar/Real ↑' },
    { label:'WTI',     val:`${wti.pct>=0?'+':''}${wti.pct.toFixed(2)}%`,   ok: wti.pct >= -0.5,   desc: wti.pct >= -0.5 ? 'Petróleo estável' : 'Petróleo caindo' },
    { label:'NQ1!',    val:`${nq.pct>=0?'+':''}${nq.pct.toFixed(2)}%`,     ok: nq.pct > 0,        desc: nq.pct > 0 ? 'Nasdaq subindo' : 'Nasdaq caindo' },
    { label:'SPX',     val:`${spx.pct>=0?'+':''}${spx.pct.toFixed(2)}%`,   ok: spx.pct > 0,       desc: spx.pct > 0 ? 'SPX subindo' : 'SPX caindo' },
    { label:'BR10Y',   val:`${br10y.pct>=0?'+':''}${br10y.pct.toFixed(2)}%`, ok: br10y.pct <= 0,  desc: br10y.pct <= 0 ? 'Juro BR estável' : 'Juro BR subindo' },
    { label:'US10Y',   val:`${us10y.pct>=0?'+':''}${us10y.pct.toFixed(2)}%`, ok: us10y.pct < 0,   desc: us10y.pct < 0 ? 'Treasury ↓' : 'Treasury ↑' },
    { label:'EWZ',     val: ewzOpen ? `${ewz.pct>=0?'+':''}${ewz.pct.toFixed(2)}%` : '—',
                       ok: ewzOpen ? ewz.pct > 0 : null,
                       desc: !ewzOpen ? 'Fechado (abre 10h30)' : ewz.pct > 0 ? 'Fluxo gringo +' : 'Fluxo gringo −',
                       inactive: !ewzOpen },
  ];

  const active  = drivers.filter(d => d.inactive !== true);
  const bullish = drivers.filter(d => d.ok === true);
  const bearish = drivers.filter(d => d.ok === false);
  const score   = bullish.length;
  const total   = active.length;

  let vIcon, vCls, vText, vSub;
  const thresh4 = Math.round(total * 0.8);
  const thresh3 = Math.round(total * 0.5);
  if (score >= thresh4) {
    vIcon = '🟢'; vCls = 'fav';
    vText = 'Ambiente FAVORÁVEL à alta do WIN';
  } else if (score >= thresh3) {
    vIcon = '🟡'; vCls = 'neu';
    vText = 'Ambiente NEUTRO — sem viés claro';
  } else {
    vIcon = '🔴'; vCls = 'def';
    vText = 'Ambiente DESFAVORÁVEL — pressão vendedora';
  }
  vSub = `${score}/${total} drivers alinhados`;

  document.querySelector('.verdict-icon').textContent = vIcon;
  const vtEl = document.getElementById('verdict-text');
  vtEl.textContent = vText;
  vtEl.className = `verdict-text ${vCls}`;
  document.getElementById('verdict-sub').textContent = vSub;

  function renderPills(containerId, countId, items, pillCls) {
    const el = document.getElementById(containerId);
    const ct = document.getElementById(countId);
    ct.textContent = items.length;
    if (items.length === 0) {
      el.innerHTML = '<span class="panel-empty">Nenhum driver neste lado</span>';
      return;
    }
    el.innerHTML = items.map(d => `
      <div class="pill ${pillCls}">
        <span class="pill-label">${d.label}</span>
        <span class="pill-val">${d.val}</span>
        <span class="pill-desc">${d.desc}</span>
      </div>
    `).join('');
  }

  renderPills('pills-up', 'count-up', bullish, 'ok');
  renderPills('pills-dn', 'count-dn', bearish, 'bad');
}

async function refreshAll() {
  const keys = ['es','vix','dxy','usdbrl','wti','nq','spx','br10y','us10y','ewz'];
  const results = await Promise.allSettled(
    INSTRUMENTS.map(ins => fetchQuote(ins.yf))
  );
  results.forEach((res, i) => {
    const ins = INSTRUMENTS[i];
    if (res.status === 'fulfilled') {
      try {
        const data = parseQuote(res.value);
        updateCard(i, data, ins);
        latest[keys[i]] = data;
      } catch(e) {
        console.warn(ins.sym, 'parse error', e);
        const row = document.getElementById(`price-${i}`);
        row.querySelector('.price-val').textContent = '—';
        row.querySelector('.price-chg').textContent = 'erro';
      }
    } else {
      console.warn(ins.sym, res.reason);
      const row = document.getElementById(`price-${i}`);
      row.querySelector('.price-val').textContent = '—';
      row.querySelector('.price-chg').textContent = 'erro';
    }
  });
  analyzeSignal();
}

function tickClock() {
  const t = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
  const p = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    'BRT ' + p(t.getHours()) + ':' + p(t.getMinutes()) + ':' + p(t.getSeconds());
}

buildGrid();
refreshAll();
setInterval(refreshAll, 300_000);
tickClock();
setInterval(tickClock, 1000);
</script>
