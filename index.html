<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel WIN — 5 Drivers</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg:       #ffffff;
    --bg2:      #f5f5f3;
    --bg3:      #efefec;
    --text:     #1a1a18;
    --text2:    #5a5a57;
    --text3:    #9a9a96;
    --border:   rgba(0,0,0,0.09);
    --border2:  rgba(0,0,0,0.16);
    --up:       #1D9E75;
    --down:     #E24B4A;
    --neutral:  #888780;
    --radius:   8px;
    --radius-lg:12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:    #1e1e1c;
      --bg2:   #272724;
      --bg3:   #313130;
      --text:  #e8e8e4;
      --text2: #a8a8a4;
      --text3: #686864;
      --border:  rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --up:   #27C87A;
      --down: #FC8181;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px;
  }
  .container { max-width: 820px; margin: 0 auto; }

  .topbar {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap; gap: 10px;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: #185FA5; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; flex-shrink: 0;
  }
  .ttl  { font-size: 15px; font-weight: 500; color: var(--text); }
  .sub  { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .clock {
    font-size: 12px; color: var(--text2);
    background: var(--bg); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 5px 10px;
    font-variant-numeric: tabular-nums;
  }
  .btn {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--text2);
    background: var(--bg); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 5px 12px;
    cursor: pointer;
  }
  .btn:hover { background: var(--bg2); }
  .btn.loading i { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 10px;
  }
  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    border-top-width: 3px;
    padding: 12px 14px;
  }
  .card.r1, .card.r2 { border-top-color: #185FA5; }
  .card.r3, .card.r4 { border-top-color: #854F0B; }
  .card.r5            { border-top-color: #0F6E56; }

  .rank-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .rank-num { font-size: 10px; font-weight: 500; color: var(--text3); }
  .tag { font-size: 10px; font-weight: 500; padding: 1px 6px; border-radius: 4px; }
  .t-us { background: #E6F1FB; color: #0C447C; }
  .t-fx { background: #FAEEDA; color: #633806; }
  .t-cm { background: #FAECE7; color: #712B13; }
  @media (prefers-color-scheme: dark) {
    .t-us { background: #042C53; color: #85B7EB; }
    .t-fx { background: #412402; color: #FAC775; }
    .t-cm { background: #4A1B0C; color: #F0997B; }
  }
  .c-sym   { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .c-name  { font-size: 10px; color: var(--text3); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .c-price { font-size: 19px; font-weight: 500; color: var(--text); font-variant-numeric: tabular-nums; min-height: 24px; margin-bottom: 2px; }
  .c-var   { font-size: 12px; font-weight: 500; font-variant-numeric: tabular-nums; min-height: 16px; }
  .c-why   { font-size: 10px; color: var(--text3); margin-top: 8px; border-top: 0.5px solid var(--border); padding-top: 6px; line-height: 1.5; }
  .up      { color: var(--up); }
  .down    { color: var(--down); }
  .nc      { color: var(--text3); }

  .skel {
    display: inline-block; background: var(--bg3);
    border-radius: 4px; height: 13px; width: 50%;
    animation: pulse 1.2s ease-in-out infinite; vertical-align: middle;
  }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.9} }

  .signal {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 12px 16px; margin-bottom: 6px;
  }
  .sdot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .sdot.bull { background: var(--up); }
  .sdot.bear { background: var(--down); }
  .sdot.neutral { background: var(--neutral); }
  .stitle { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .stitle.bull { color: #085041; }
  .stitle.bear { color: #791F1F; }
  .stitle.neutral { color: var(--text2); }
  @media (prefers-color-scheme: dark) {
    .stitle.bull { color: #5DCAA5; }
    .stitle.bear { color: #F09595; }
  }
  .sdesc { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .sfacts { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .sfact {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    background: var(--bg2); border: 0.5px solid var(--border2);
    font-variant-numeric: tabular-nums; color: var(--text2);
  }
  .sfact.up   { color: var(--up); }
  .sfact.down { color: var(--down); }

  .footer {
    font-size: 11px; color: var(--text3);
    text-align: right; margin-top: 6px;
  }
  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">B3</div>
      <div>
        <div class="ttl">Painel WIN — 5 Drivers principais</div>
        <div class="sub">Correlação mais alta com o mini-índice</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="clock" id="clock">BRT --:--:--</div>
      <button class="btn" id="btn" onclick="loadAll()">
        <i class="ti ti-refresh" style="font-size:14px" aria-hidden="true"></i>
        Atualizar
      </button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="signal" id="signal">
    <div class="sdot neutral"></div>
    <div>
      <div class="stitle neutral">Carregando sinal...</div>
      <div class="sdesc">Aguardando dados.</div>
    </div>
  </div>

  <div class="footer" id="upd"></div>

</div>
<script>
const ASSETS = [
  { rank:1, sym:'ES1!',   yf:'ES=F',      name:'Futuro S&P 500',   tag:'t-us', tagLabel:'EUA',      why:'Move o WIN overnight. Principal referência global.' },
  { rank:2, sym:'VIX',    yf:'^VIX',      name:'Volatilidade S&P', tag:'t-us', tagLabel:'EUA',      why:'Acima de 25 = fuga de risco. Correlação inversa direta.' },
  { rank:3, sym:'DXY',    yf:'DX-Y.NYB',  name:'Índice do dólar',  tag:'t-fx', tagLabel:'Câmbio',   why:'Dólar forte drena emergentes. Pesa no WIN via fluxo.' },
  { rank:4, sym:'USD/BRL',yf:'USDBRL=X',  name:'Dólar / Real',     tag:'t-fx', tagLabel:'Câmbio',   why:'Câmbio local. Alta do dólar pressiona o Ibovespa.' },
  { rank:5, sym:'WTI',    yf:'CL=F',      name:'Petróleo WTI',     tag:'t-cm', tagLabel:'Commodity',why:'Petrobras ≈15% do Ibov. Petróleo sobe = WIN sobe.' },
];

let data = {};

const fmt = (v, sym) => {
  if (v == null || isNaN(v)) return null;
  if (sym === 'VIX') return v.toFixed(2);
  if (v > 10000) return v.toLocaleString('pt-BR', { maximumFractionDigits: 0 });
  if (v > 100)   return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return v.toLocaleString('pt-BR', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
};
const fmtPct = v => v == null ? null : (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
const vcls   = v => v == null ? 'nc' : v > 0 ? 'up' : v < 0 ? 'down' : 'nc';

function buildCard(a) {
  const d  = data[a.sym];
  const pr = d ? fmt(d.price, a.sym) : null;
  const ch = d ? fmtPct(d.change) : null;
  const cc = d ? vcls(d.change) : 'nc';
  return `<div class="card r${a.rank}">
    <div class="rank-row">
      <span class="rank-num">#${a.rank}</span>
      <span class="tag ${a.tag}">${a.tagLabel}</span>
    </div>
    <div class="c-sym">${a.sym}</div>
    <div class="c-name">${a.name}</div>
    <div class="c-price">${pr ?? '<span class="skel"></span>'}</div>
    <div class="c-var ${cc}">${ch ?? ''}</div>
    <div class="c-why">${a.why}</div>
  </div>`;
}

function renderGrid() {
  document.getElementById('grid').innerHTML = ASSETS.map(buildCard).join('');
}

function renderSignal() {
  const es  = data['ES1!']?.change;
  const vix = data['VIX']?.price;
  const dxy = data['DXY']?.change;
  const usd = data['USD/BRL']?.change;
  const oil = data['WTI']?.change;
  let score = 0, facts = [];

  if (es  != null) { score += es > 0.3 ? 2 : es < -0.5 ? -2 : es < 0 ? -1 : 0; facts.push({l:`ES1! ${fmtPct(es)}`,    c:vcls(es)}); }
  if (vix != null) { score += vix < 17 ? 1 : vix > 25 ? -2 : vix > 20 ? -1 : 0; facts.push({l:`VIX ${vix.toFixed(1)}`, c:vix>25?'down':vix<17?'up':'nc'}); }
  if (dxy != null) { score += dxy < -0.2 ? 1 : dxy > 0.3 ? -1 : 0; facts.push({l:`DXY ${fmtPct(dxy)}`,     c:vcls(-dxy)}); }
  if (usd != null) { score += usd < -0.3 ? 1 : usd > 0.5 ? -1 : 0; facts.push({l:`USD/BRL ${fmtPct(usd)}`, c:vcls(-usd)}); }
  if (oil != null) { score += oil > 0.5  ? 1 : oil < -1  ? -1 : 0; facts.push({l:`WTI ${fmtPct(oil)}`,     c:vcls(oil)}); }

  let dot, tc, title, desc;
  if (!facts.length)    { dot='neutral'; tc='neutral'; title='Carregando sinal...';           desc='Aguardando dados dos ativos.'; }
  else if (score >=  3) { dot='bull';    tc='bull';    title='Contexto favorável ao WIN';     desc='Maioria dos drivers apontam alta. Abertura positiva provável.'; }
  else if (score >=  1) { dot='bull';    tc='bull';    title='Leve viés positivo';            desc='Mais sinais de alta do que baixa no contexto global.'; }
  else if (score <= -3) { dot='bear';    tc='bear';    title='Contexto desfavorável ao WIN';  desc='Pressão de baixa nos principais drivers. Abertura negativa provável.'; }
  else if (score <= -1) { dot='bear';    tc='bear';    title='Leve viés negativo';            desc='Mais sinais de baixa do que alta no contexto global.'; }
  else                  { dot='neutral'; tc='neutral'; title='Sinal misto';                   desc='Drivers sem direção clara. Aguardar abertura dos mercados.'; }

  const fhtml = facts.map(f=>`<span class="sfact ${f.c}">${f.l}</span>`).join('');
  document.getElementById('signal').innerHTML = `
    <div class="sdot ${dot}"></div>
    <div>
      <div class="stitle ${tc}">${title}</div>
      <div class="sdesc">${desc}</div>
      <div class="sfacts">${fhtml}</div>
    </div>`;
}

async function fetchYahoo(sym) {
  try {
    const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=2d`);
    if (!r.ok) return null;
    const j = await r.json();
    const m = j?.chart?.result?.[0]?.meta;
    if (!m) return null;
    const price  = m.regularMarketPrice ?? m.postMarketPrice;
    const prev   = m.chartPreviousClose ?? m.previousClose;
    const change = (prev && price) ? ((price - prev) / prev) * 100 : null;
    return { price, change };
  } catch { return null; }
}

async function loadAll() {
  const btn = document.getElementById('btn');
  btn.classList.add('loading');
  renderGrid();
  await Promise.allSettled(ASSETS.map(a => fetchYahoo(a.yf).then(d => { if (d) data[a.sym] = d; })));
  btn.classList.remove('loading');
  renderGrid();
  renderSignal();
  const t = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Sao_Paulo'}));
  const p = n => String(n).padStart(2,'0');
  document.getElementById('upd').textContent = `Atualizado às ${p(t.getHours())}:${p(t.getMinutes())}:${p(t.getSeconds())} BRT · atualiza a cada 60s`;
}

function tickClock() {
  const t = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Sao_Paulo'}));
  const p = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent = `BRT ${p(t.getHours())}:${p(t.getMinutes())}:${p(t.getSeconds())}`;
}

renderGrid();
loadAll();
tickClock();
setInterval(tickClock, 1000);
setInterval(loadAll, 60000);
</script>
</body>
</html>
